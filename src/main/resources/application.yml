spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wallet_db}
    username: ${SPRING_DATASOURCE_USERNAME:wallet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:wallet_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: true
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}
  redisson:
    address: "redis://${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}:${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}"

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  cache:
    type: redis


# Cấu hình Actuator để Monitor hệ thống
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

momo:
  secret-key: ${MOMO_SECRET_KEY:my-super-secret-key-123}

jwt:
  secret: ${JWT_SECRET:my-super-wallet-secure-secret-key-default-value}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

